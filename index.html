<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Rock Paper Scissors</title>
    <link href="style.css" rel="stylesheet" />
    <script src="javascript.js" defer></script>
  </head>
  <body>
    <h1>Rock Paper Scissors</h1>
    <ul id="rps-buttons">
      <li><button id="rock" type="button">Rock</button></li>
      <li><button id="paper" type="button">Paper</button></li>
      <li><button id="scissors" type="button">Scissors</button></li>
    </ul>
    <div id="game-over">
      <p>Game Over</p>
      <div id="game-winner">
        <p>Winner message here</p>
      </div>
    </div>
    <div id="score">
      <div id="player-a-score">Player Score: <span>0</span></div>
      <div id="player-b-score">Computer Score: <span>0</span></div>
    </div>
    <div id="message"></div>
  </body>
</html>
